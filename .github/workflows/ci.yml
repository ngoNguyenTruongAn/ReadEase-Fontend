name: Frontend CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-react:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 22
      uses: actions/setup-node@v3
      with:
        node-version: '22.x'
        
    - name: Cài đặt và Test Frontend
      run: |
        npm install
        npm run build --if-present